<style>
*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Noto Sans SC',sans-serif;background:#0a0a2e;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;overflow:hidden}

function startGame(lvl){

function doStart(){
  if(over&&kills>=GOAL){

    if(level<5)startGame(level+1);

  }else startGame();
}

function nextHandler(e){
  const k=e.key.toUpperCase();
  if(k.length===1||e.key==='Enter'){
    e.preventDefault();
    document.removeEventListener('keydown',nextHandler);
    if(level<5){startGame(level+1);}
    else{st.textContent='🎉🎊 全部通关！你是打字大师！🎊🎉';run=false;}
  }
}

document.addEventListener('keydown',e=>{
  const k=e.key.toUpperCase();
  if(k.length===1&&k>='A'&&k<='Z'){
    e.preventDefault();
    if(!run)startGame();
    fire(k);
  }
  if(e.key==='Enter'&&!run)startGame();
});

  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];
    if(e.word[e.typed.length]===ch){best=e;bi=i;break;}
  }
  if(best){
    best.typed+=ch;
    if(best.typed===best.word){
      kills++;score++;kills++;
      sD.textContent=score;pD.textContent=`${kills}/${GOAL}`;
      enemies.splice(bi,1);
      if(kills>=GOAL){
        st.textContent=`🎉🎊 第${level}关通关！太棒了！按任意键进入下一关 🎊🎉`;
        over=true;run=false;
        document.getElementById('sBtn').textContent='▶ 下一关';
        // 庆祝爆炸
        for(let i=0;i<30;i++){
          setTimeout(()=>{
            explosions.push({
              x:100+Math.random()*(W-200),y:50+Math.random()*(H-100),
              r:20+Math.random()*40,t:30+Math.random()*20,
              c:['#00f5ff','#a855f7','#ff6bcb','#ffd54f','#4caf50'][Math.floor(Math.random()*5)]
            });
          },i*80);
        }
        document.addEventListener('keydown',nextHandler);
        return;
      }
      st.textContent=`已消灭${kills}/${GOAL} +1分 👍`;
    }
  }
}

function update(){
  if(!run||over)return;
  const mx=Math.min(2+Math.floor(level/3),3); // 最多2-3个
  if(enemies.length<mx&&Math.random()<.02){ // 降低生成率
    const pool=getPool(level);
    const w=pool[Math.floor(Math.random()*pool.length)];
    if(!enemies.find(e=>e.word===w)){
      const sp=level<=1?.6:level===2?.5:.35+level*.04;
      enemies.push({word:w,typed:'',x:40+Math.random()*(W-80),y:-40,speed:sp});
    }
  }
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];e.y+=e.speed;
    if(e.y>H+10){
      score--;lives--;
      sD.textContent=Math.max(0,score);lD.textContent=Math.max(0,lives);
      enemies.splice(i,1);
      if(lives<=0){over=true;st.textContent='💀 游戏结束！生命耗尽';run=false;document.getElementById('sBtn').textContent='🚀 重新挑战';}
    }
  }
}

function draw(){
  GX.clearRect(0,0,W,H);
  GX.strokeStyle='rgba(168,85,247,.04)';GX.lineWidth=.5;
  for(let x=0;x<W;x+=40){GX.beginPath();GX.moveTo(x,0);GX.lineTo(x,H);GX.stroke();}
  for(let y=0;y<H;y+=40){GX.beginPath();GX.moveTo(0,y);GX.lineTo(W,y);GX.stroke();}
  for(const e of enemies){
    const cx=e.x,cy=e.y;
    // 光晕
    const gg=GX.createRadialGradient(cx,cy,0,cx,cy,50);
    gg.addColorStop(0,'rgba(255,50,100,.08)');gg.addColorStop(1,'transparent');
    GX.fillStyle=gg;GX.beginPath();GX.arc(cx,cy,50,0,Math.PI*2);GX.fill();
    
    // 敌人颜色按字母数变化
    const hue=((e.word.length*30)+(e.word.charCodeAt(0)*10))%360;
    const c1=`hsla(${hue},70%,50%,.2)`,c2=`hsla(${hue+30},80%,60%,.15)`;
    const c3=`hsla(${hue+60},60%,70%,.35)`,c4=`hsla(${hue},70%,50%,.3)`;
    
    // 飞船体
    GX.fillStyle=c1;GX.strokeStyle=c2;GX.lineWidth=1.5;
    GX.beginPath();GX.ellipse(cx,cy,32,16,0,0,Math.PI*2);GX.fill();GX.stroke();
    
    // 驾驶舱
    GX.fillStyle=c3;
    GX.beginPath();GX.ellipse(cx,cy-3,14,8,0,0,Math.PI*2);GX.fill();
    GX.fillStyle='rgba(255,255,255,.08)';
    GX.beginPath();GX.ellipse(cx-3,cy-5,6,4,0,0,Math.PI*2);GX.fill();
    
    // 机翼
    GX.fillStyle=c4;
    GX.beginPath();GX.moveTo(cx-26,cy-2);GX.lineTo(cx-34,cy+6);GX.lineTo(cx-26,cy+8);GX.closePath();GX.fill();
    GX.beginPath();GX.moveTo(cx+26,cy-2);GX.lineTo(cx+34,cy+6);GX.lineTo(cx+26,cy+8);GX.closePath();GX.fill();
    
    // 推进器火焰
    GX.fillStyle='rgba(255,200,50,.6)';
    GX.beginPath();GX.moveTo(cx-10,cy+12);GX.lineTo(cx,cy+20);GX.lineTo(cx+10,cy+12);GX.closePath();GX.fill();
    GX.fillStyle='rgba(255,100,50,.4)';
    GX.beginPath();GX.moveTo(cx-6,cy+12);GX.lineTo(cx,cy+16);GX.lineTo(cx+6,cy+12);GX.closePath();GX.fill();
    
    // 飞船灯
    GX.fillStyle=c3;GX.shadowColor=c3;GX.shadowBlur=6;
    GX.beginPath();GX.arc(cx-12,cy+2,2.5,0,Math.PI*2);GX.fill();
    GX.beginPath();GX.arc(cx+12,cy+2,2.5,0,Math.PI*2);GX.fill();
    GX.beginPath();GX.arc(cx,cy+6,2,0,Math.PI*2);GX.fill();
    GX.shadowBlur=0;
    const sz=Math.max(16,22-e.word.length*.4);
    GX.font=`bold ${sz}px 'Courier New',monospace`;GX.textAlign='center';
    GX.fillStyle='rgba(255,107,203,.9)';
    GX.fillText(e.typed,cx,cy-48);
    GX.fillStyle='rgba(255,255,255,.35)';
    GX.fillText(e.word.slice(e.typed.length),cx,cy-26);
   }
   // 爆炸
   for(const ex of explosions){
     GX.save();GX.globalAlpha=ex.t/25;
     const g=GX.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,ex.r);
     g.addColorStop(0,ex.c);g.addColorStop(.3,ex.c+'80');g.addColorStop(1,'transparent');
     GX.fillStyle=g;GX.beginPath();GX.arc(ex.x,ex.y,ex.r,0,Math.PI*2);GX.fill();
     GX.restore();
   }
   // 爆炸消退
  for(const ex of explosions){ex.t--;}
  explosions=explosions.filter(e=>e.t>0);
  if(!run&&!over){
    GX.fillStyle='rgba(0,0,0,.5)';GX.fillRect(0,0,W,H);
    GX.fillStyle='rgba(255,255,255,.3)';
    GX.font='bold 22px Orbitron,sans-serif';GX.textAlign='center';GX.textBaseline='middle';
    GX.fillText('按字母键开始 ⌨',W/2,H/2);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();

// 音乐
let AC,mp=false,GN,ONS=[];
function initA(){if(AC)return;AC=new(window.AudioContext||window.webkitAudioContext)();GN=AC.createGain();GN.gain.value=.12;GN.connect(AC.destination);}
function toggleM(){initA();mp=!mp;document.getElementById('mBtn').textContent=mp?'🔊':'🔇';if(mp)playM();else stopM();}
function stopM(){for(const o of ONS){try{o.stop();o.disconnect();}catch(e){}}ONS=[];if(AC&&AC.state==='suspended')AC.resume();}
function playM(){if(!mp||!AC)return;stopM();
  const mel=[[262,.3],[330,.3],[392,.3],[523,.3],[392,.3],[330,.3],[294,.3],[330,.4],[349,.3],[440,.3],[523,.3],[659,.4],[523,.3],[440,.3],[392,.4],[330,.3],[294,.3],[349,.3],[440,.5],[392,.3],[349,.3],[330,.4],[262,.3],[294,.3],[330,.3],[392,.3],[523,.4],[494,.3],[440,.3],[392,.4],[330,.3],[349,.5]];
  let t=0;for(const[f,d]of mel){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,AC.currentTime+t);g.gain.linearRampToValueAtTime(.12,AC.currentTime+t+.03);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+t+d*.9);o.connect(g);g.connect(GN);o.start(AC.currentTime+t);o.stop(AC.currentTime+t+d);ONS.push(o);t+=d;}
  if(mp)setTimeout(playM,t*1000+800);
}
st.textContent='🚀 选关后直接按字母键开始！';
</script>
