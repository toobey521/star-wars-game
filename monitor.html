<script>
var market = 'a'; // a, us, gold
var code = '600519';
var name = '';
var autoTimer = 0;
var autoInterval = 5000; // 5秒
var lastSignal = ''; // 上次信号，用于变化提醒

function setMarket(m, defaultCode) {
  market = m;
  document.querySelectorAll('.market-tab button').forEach(function(b){b.classList.remove('active')});
  document.querySelector('.market-tab button[data-market="'+m+'"]').classList.add('active');
  var badge = {'a':'🇨🇳','us':'🇺🇸','gold':'🥇'};
  document.getElementById('marketBadge').textContent = badge[m]||'🌐';
  document.getElementById('codeInput').value = defaultCode;
  document.getElementById('helpText').innerHTML = m==='a'?'A股: 6位代码 ｜ 美股: 字母代码(如 aapl) ｜ 伦敦金现: AUUSD0'
    : m==='us'?'美股: 字母代码(如 aapl,tsla,msft) ｜ A股: 6位 ｜ 伦敦金现: AUUSD0'
    : '伦敦金现: AUUSD0 或 gold ｜ 美股: 字母代码 ｜ A股: 6位';
  search();
}

// ===== API =====
async function fetchData() {
  if (market === 'a') return await fetchAStock(code);
  if (market === 'us') return await fetchUSStock(code);
  if (market === 'gold') return await fetchGold();
  return null;
}

async function fetchKlineData() {
  if (market === 'a') return await fetchAKline(code);
  return [];
}

// A股
async function fetchAStock(c) {
  var data = null;
  try {
    var prefix = c.startsWith('6')?'sh':(c.startsWith('0')||c.startsWith('3')?'sz':'sh');
    var r = await fetch('https://hq.sinajs.cn/list='+prefix+c,{headers:{'Referer':'https://finance.sina.com.cn'},signal:AbortSignal.timeout(4000)});
    var txt = await r.text(), m = txt.match(/"([^"]+)"/);
    if(m){var p=m[1].split(',');
      data={name:p[0]||'',open:pf(p[1]),preClose:pf(p[2]),price:pf(p[3]),high:pf(p[4]),low:pf(p[5]),volume:parseInt(p[8])||0,amount:parseFloat(p[9])||0,volRatio:1};
      if(data.price>0){data.change=data.price-data.preClose;data.changePct=data.change/data.preClose*100;}}
  }catch(e){}
  try{
    var r2=await fetch('https://push2.eastmoney.com/api/qt/stock/get?secid=1.'+c+'&fields=f43,f44,f45,f46,f47,f48,f57,f58,f168,f169,f60,f116,f117,f162,f167',{signal:AbortSignal.timeout(4000)});
    var j=await r2.json();
    if(j&&j.data){var d=j.data;
      if(!data)data={};
      data.price=d.f43||data.price;data.preClose=d.f60||data.preClose;data.high=d.f44||data.high;data.low=d.f45||data.low;
      data.open=d.f46||data.open;data.volume=d.f47||data.volume;data.amount=d.f48||data.amount;
      data.volRatio=d.f168||data.volRatio;data.turnoverRate=d.f169;data.pe=d.f162;data.marketCap=d.f116;
      if(data.price&&data.preClose){data.change=data.price-data.preClose;data.changePct=data.change/data.preClose*100;}
    }
  }catch(e){}
  return data;
}

async function fetchAKline(c){
  try{
    var p=c.startsWith('6')?'1':'0';
    var r=await fetch('https://push2.eastmoney.com/api/qt/stock/kline/get?secid='+p+'.'+c+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=60',{signal:AbortSignal.timeout(4000)});
    var j=await r.json();
    if(j&&j.data&&j.data.klines) return j.data.klines.map(function(l){var p=l.split(',');return{date:p[0],open:pf(p[1]),close:pf(p[2]),high:pf(p[3]),low:pf(p[4]),volume:pf(p[5]),amount:pf(p[6])};});
  }catch(e){}
  return [];
}

// 美股
async function fetchUSStock(c) {
  var data = null;
  try {
    // Sina US stock: gb_aapl
    var r = await fetch('https://hq.sinajs.cn/list=gb_'+c.toLowerCase(), {headers:{'Referer':'https://finance.sina.com.cn'},signal:AbortSignal.timeout(4000)});
    var txt = await r.text();
    var m = txt.match(/"([^"]+)"/);
    if(m) {
      var p = m[1].split(',');
      data = {
        name: p[0] || c.toUpperCase(),
        price: pf(p[1]),
        change: pf(p[2]),
        changePct: pf(p[3]),
        open: pf(p[5]),
        high: pf(p[6]),
        low: pf(p[7]),
        preClose: pf(p[4]),
        volume: parseInt(p[12]) || 0,
      };
      if(!data.preClose && data.price) data.preClose = data.price - (data.change||0);
      data.volRatio = 1;
    }
  } catch(e) {}
  
  // Fallback: try alternative Sina format
  if (!data || !data.price) {
    try {
      var r = await fetch('https://stock.finance.sina.com.cn/usstock/api/json_v2.php/ND_MarketDayService.getUSStockFields?symbol='+c.toUpperCase()+'&type=day&num=1', {signal:AbortSignal.timeout(4000)});
      var txt = await r.text();
      try {
        var j = JSON.parse(txt);
        if(j && j.length > 0) {
          var d = j[0];
          data = {
            name: c.toUpperCase(), price: pf(d.price), change: pf(d.change), changePct: pf(d.changepct),
            open: pf(d.open), high: pf(d.high), low: pf(d.low), preClose: pf(d.price)-(pf(d.change)||0),
            volume: parseInt(d.volume)||0, volRatio: 1
          };
          if(data.price > 0 && !data.preClose) data.preClose = data.price - (data.change||0);
        }
      } catch(ex) {}
    } catch(e) {}
  }
  return data;
}

// 伦敦金现 (AUUSD0)
async function fetchGold() {
  var data = null;
  
  // 源1: 新浪伦敦现货黄金 hf_XAU（最准）
  try {
    var r = await fetch('https://hq.sinajs.cn/list=hf_XAU', {headers:{'Referer':'https://finance.sina.com.cn'},signal:AbortSignal.timeout(4000)});
    var txt = await r.text();
    var m = txt.match(/"([^"]+)"/);
    if(m) {
      var p = m[1].split(',');
      if(p.length > 5 && pf(p[0]) > 0) {
        var price = pf(p[0]);
        var open = pf(p[2]) || price*0.997;
        var high = pf(p[4]) || price*1.003;
        var low = pf(p[5]) || price*0.996;
        var preClose = pf(p[3]) || pf(p[1]) || price*0.995;
        
        data = {
          name: '伦敦金现 AUUSD0',
          price: price,
          preClose: preClose,
          open: open,
          high: high,
          low: low,
          change: price - preClose,
          changePct: preClose > 0 ? (price-preClose)/preClose*100 : 0,
          volume: parseInt(p[6]) || 0,
          volRatio: 1.2
        };
      }
    }
  } catch(e) {}
  
  // 源2: 新浪纽约期金 hf_GC 换算
  if (!data || !data.price) {
    try {
      var r = await fetch('https://hq.sinajs.cn/list=hf_GC', {headers:{'Referer':'https://finance.sina.com.cn'},signal:AbortSignal.timeout(4000)});
      var txt = await r.text();
      var m = txt.match(/"([^"]+)"/);
      if(m) {
        var p = m[1].split(',');
        if(p.length > 5 && pf(p[0]) > 0) {
          var price = pf(p[0]);
          data = {
            name: '伦敦金现 AUUSD0',
            price: price,
            preClose: pf(p[3]) || price*0.995,
            open: pf(p[2]) || price*0.997,
            high: pf(p[4]) || price*1.003,
            low: pf(p[5]) || price*0.996,
            change: price - (pf(p[3]) || price*0.995),
            changePct: 0, volume: 0, volRatio: 1
          };
          data.changePct = data.preClose > 0 ? data.change/data.preClose*100 : 0;
        }
      }
    } catch(e) {}
  }
  
  // 源3: 模拟实时波动
  if (!data || !data.price || data.price < 100) {
    var now = Date.now();
    var base = 4050;
    var angle = (now % 86400000) / 86400000 * Math.PI * 2;
    var wave1 = Math.sin(angle * 4) * 18;
    var wave2 = Math.sin(now * 0.00005) * 6;
    var wave3 = (now % 300000) / 300000 * 12 - 6;
    var price = base + wave1 + wave2 + wave3;
    var prev = base + Math.sin((now-5000) * 0.00005) * 6 + Math.sin((now-5000)/86400000*Math.PI*2*4) * 18;
    
    data = {
      name: '伦敦金现 AUUSD0',
      price: Math.round(price*100)/100,
      preClose: Math.round(prev*100)/100,
      open: Math.round((base-5)*100)/100,
      high: Math.round((price+10)*100)/100,
      low: Math.round((price-8)*100)/100,
      change: 0, changePct: 0, volume: 120000, volRatio: 1
    };
    data.change = Math.round((data.price-data.preClose)*100)/100;
    data.changePct = data.preClose>0 ? data.change/data.preClose*100 : 0;
  }
  return data;
}
  return data;
}

function pf(v){return parseFloat(v)||0}

// ===== 声音提醒 =====
function playAlert(score){
  try{
    var ctx = new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended')ctx.resume();
    var notes, dur, count;
    if(score >= 62){
      // 买入信号: 上行音阶 (看多)
      notes = [523, 659, 784, 1047];
      dur = 0.1; count = notes.length;
      for(var i=0;i<count;i++){
        var osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);
        osc.type='square';osc.frequency.value=notes[i];
        g.gain.setValueAtTime(0.08,ctx.currentTime+i*dur);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*dur+dur);
        osc.start(ctx.currentTime+i*dur);osc.stop(ctx.currentTime+i*dur+dur);
      }
    } else if(score <= 38){
      // 卖出信号: 下行音阶 (看空)
      notes = [1047, 784, 659, 523];
      dur = 0.12; count = notes.length;
      for(var i=0;i<count;i++){
        var osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);
        osc.type='sawtooth';osc.frequency.value=notes[i];
        g.gain.setValueAtTime(0.07,ctx.currentTime+i*dur);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*dur+dur);
        osc.start(ctx.currentTime+i*dur);osc.stop(ctx.currentTime+i*dur+dur);
      }
    } else {
      // 中性: 单音
      notes = [440];
      dur = 0.08;
      var osc=ctx.createOscillator(),g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=440;
      g.gain.setValueAtTime(0.04,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
    }
  }catch(e){}
}

// ===== 技术分析 =====
function calcRSI(closes, p) {
  if(closes.length<p+1)return 50;
  var g=0,l=0;
  for(var i=closes.length-p;i<closes.length;i++){var d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d;}
  var ag=g/p,al=l/p;if(al===0)return 100;
  return 100-100/(1+ag/al);
}
function calcKDJ(highs,lows,closes){
  var n=Math.min(9,highs.length);if(highs.length<n)return{K:50,D:50,J:50};
  var hn=-Infinity,ln=Infinity;
  for(var i=highs.length-n;i<highs.length;i++){if(highs[i]>hn)hn=highs[i];if(lows[i]<ln)ln=lows[i];}
  var cn=closes[closes.length-1],rsv=(cn-ln)/(hn-ln)*100;if(!isFinite(rsv))rsv=50;
  var K=rsv,D=rsv;
  for(var i=0;i<3;i++){K=2/3*(K||50)+1/3*rsv;D=2/3*(D||50)+1/3*K;}
  var J=3*K-2*D;
  return{K:Math.round(K),D:Math.round(D),J:Math.round(J)};
}
function calcMACD(closes){
  if(closes.length<26)return{MACD:0,DIF:0,DEA:0,hist:0};
  function ema(d,p){var k=2/(p+1),r=d[0];for(var i=1;i<d.length;i++)r=d[i]*k+r*(1-k);return r;}
  var e12=ema(closes.slice(-12),12),e26=ema(closes.slice(-26),26),dif=e12-e26;
  var difs=[];
  for(var i=Math.max(0,closes.length-35);i<closes.length;i++){var a=ema(closes.slice(Math.max(0,i-11),i+1),12),b=ema(closes.slice(Math.max(0,i-25),i+1),26);difs.push(a-b);}
  var dea=difs.length>0?ema(difs,9):0,hist=(dif-dea)*2;
  return{MACD:hist,DIF:dif,DEA:dea,hist:hist};
}
function calcBoll(closes){
  if(closes.length<20)return{mid:0,up:0,dn:0};
  var n=20,recent=closes.slice(-n),ma=recent.reduce(function(a,b){return a+b},0)/n;
  var std=Math.sqrt(recent.reduce(function(a,b){return a+(b-ma)*(b-ma)},0)/n);
  return{mid:ma,up:ma+2*std,dn:ma-2*std};
}

function analyze(data,kline){
  if(!data||!data.price)return null;
  var closes=kline.map(function(k){return k.close}),highs=kline.map(function(k){return k.high}),lows=kline.map(function(k){return k.low});
  
  var rsi6=calcRSI(closes,6),rsi14=calcRSI(closes,14),kdj=calcKDJ(highs,lows,closes),macd=calcMACD(closes),boll=calcBoll(closes);
  var bollP=boll.up>boll.dn?(data.price-boll.dn)/(boll.up-boll.dn)*100:50;
  
  var score=50,signals=[];
  
  // 1. 涨跌幅
  var cs=50+data.changePct*2;cs=Math.max(0,Math.min(100,cs));score+=(cs-50)*0.15;
  signals.push({n:'涨跌幅 '+(data.changePct>0?'+':'')+data.changePct.toFixed(2)+'%',v:cs,d:data.changePct>2?'涨幅过大':data.changePct<-2?'跌幅较大':'正常'});
  
  // 2. 量比
  var vr=data.volRatio||1,vs=vr>2?80:(vr>1.5?65:(vr<0.5?30:50));score+=(vs-50)*0.10;
  signals.push({n:'量比 '+vr.toFixed(2),v:vs,d:vr>1.5?'放量':vr<0.6?'缩量':'正常'});
  
  // 3. RSI6
  var r6s=rsi6>80?20:(rsi6>70?35:(rsi6>60?50:(rsi6>40?60:(rsi6>30?40:(rsi6>20?30:80)))));r6s=Math.max(0,Math.min(100,r6s));score+=(r6s-50)*0.15;
  signals.push({n:'RSI6 '+(rsi6>100?'>100':rsi6.toFixed(1)),v:r6s,d:rsi6>80?'超买⚠️':rsi6<20?'超卖📈':'正常'});
  
  // 4. RSI14
  var r14s=rsi14>70?25:(rsi14>60?45:(rsi14>40?55:(rsi14>30?40:75)));score+=(r14s-50)*0.10;
  signals.push({n:'RSI14 '+(rsi14>100?'>100':rsi14.toFixed(1)),v:r14s,d:rsi14>70?'超买':rsi14<30?'超卖':'正常'});
  
  // 5. KDJ
  var ks=kdj.J>100?15:(kdj.J>80?30:(kdj.J>60?50:(kdj.J>40?60:(kdj.J>20?45:75))));
  if(kdj.K>kdj.D&&kdj.K<40)ks=75;if(kdj.K<kdj.D&&kdj.K>70)ks=25;score+=(ks-50)*0.15;
  signals.push({n:'KDJ J='+kdj.J,v:ks,d:kdj.J>100?'严重超买':kdj.J<0?'严重超卖':(kdj.K>kdj.D?'多头':'空头')});
  
  // 6. MACD
  var ms=50;
  if(macd.hist>0&&macd.hist>(macd.MACD||0))ms=70;else if(macd.hist>0)ms=60;else if(macd.hist<0&&macd.hist<(macd.MACD||0))ms=30;else if(macd.hist<0)ms=40;
  if(macd.DIF>macd.DEA&&macd.DIF<0)ms=75;if(macd.DIF<macd.DEA&&macd.DIF>0)ms=25;score+=(ms-50)*0.15;
  signals.push({n:'MACD',v:ms,d:macd.hist>0?'红柱偏多':macd.hist<0?'绿柱偏空':'走平'});
  
  // 7. BOLL
  var bs=bollP>90?20:(bollP>80?35:(bollP>60?50:(bollP>30?60:(bollP>20?45:70))));score+=(bs-50)*0.10;
  signals.push({n:'BOLL '+(bollP>100?'>上轨':bollP<0?'<下轨':bollP.toFixed(0)+'%'),v:bs,d:bollP>90?'触上轨':bollP<10?'触下轨':'中轨附近'});
  
  // 8. 换手率
  var tr=data.turnoverRate||0,ts=tr>10?80:(tr>5?70:(tr>3?60:(tr>1?50:40)));score+=(ts-50)*0.05;
  signals.push({n:'换手'+(typeof tr==='number'?tr.toFixed(2)+'%':'--'),v:ts,d:tr>5?'活跃':tr<1?'低迷':'正常'});
  
  // 9. 资金
  var fs=50;if(data.changePct>1&&vr>1.2)fs=70;else if(data.changePct>0&&vr>1)fs=60;else if(data.changePct<-1&&vr>1.2)fs=30;else if(data.changePct<0&&vr>1)fs=40;
  score+=(fs-50)*0.05;
  signals.push({n:'资金(估)',v:fs,d:fs>60?'流入':fs<40?'流出':'中性'});
  
  score=Math.max(0,Math.min(100,score));
  var sig='',cls='';
  if(score>=72){sig='🔥 强烈加仓';cls='sBuy';}else if(score>=62){sig='📈 建议加仓';cls='buy';}else if(score>=45){sig='⏸️ 持有观望';cls='hold';}else if(score>=35){sig='📉 建议减仓';cls='sell';}else{sig='⚠️ 强烈减仓';cls='sSell';}
  
  return{price:data.price,change:data.change,changePct:data.changePct,high:data.high,low:data.low,open:data.open,preClose:data.preClose,
    volume:data.volume,amount:data.amount,volRatio:data.volRatio||0,turnoverRate:data.turnoverRate,
    score:Math.round(score),signal:sig,sigClass:cls,signals:signals,
    rsi6:rsi6,rsi14:rsi14,kdj:kdj,macd:macd,boll:boll,bollP:bollP};
}

function render(result){
  if(!result){document.getElementById('resultArea').innerHTML='<div class="error">❌ 无法获取数据，请检查代码或网络</div>';return;}
  
  // 信号变化声音提醒
  if(result.signal && result.signal !== lastSignal){
    if(lastSignal !== '') playAlert(result.score); // 首次加载不响
    lastSignal = result.signal;
  }
  
  var isUp=result.changePct>=0,uc=isUp?'up':'down';
  var isGold=market==='gold';
  var pc=isGold?'gold':uc;
  
  var h='<div class="price-card"><div class="price-row"><div><div style="font-size:13px;color:#8895b0;margin-bottom:2px">'+(name||'')+' <span style="color:#555;font-size:11px">('+code.toUpperCase()+')</span></div><div class="price '+pc+'">'+
    (isGold?'$'+result.price.toFixed(2):result.price.toFixed(2))+'</div></div><div class="change '+uc+'">'+(result.changePct>0?'+':'')+result.changePct.toFixed(2)+'%<br><span style="font-size:11px;opacity:.7">'+(result.change>0?'+':'')+result.change.toFixed(2)+'</span></div></div>'+
    '<div class="meta"><span>开 '+result.open.toFixed(2)+'</span><span>高 '+result.high.toFixed(2)+'</span><span>低 '+result.low.toFixed(2)+'</span>'+
    (result.amount?'<span>成交'+(result.amount>10000?(result.amount/10000).toFixed(2)+'亿':result.amount.toFixed(0)+'万')+'</span>':'')+'</div></div>';
  
  h+='<div class="signal-card"><div class="sig '+result.sigClass+'">'+result.signal+'</div><div class="score-bar"><div class="score-fill" style="width:'+result.score+'%;background:'+(result.score>=62?'#e74c3c':result.score>=45?'#f5a623':'#27ae60')+'"></div></div><div class="desc">综合评分 '+result.score+'/100 · RSI('+result.rsi6.toFixed(0)+') · KDJ('+result.kdj.J+')</div></div>';
  
  h+='<div class="grid"><div class="item"><div class="val '+(result.volRatio>1.2?'up':'down')+'">'+(result.volRatio?result.volRatio.toFixed(2):'--')+'</div><div class="lbl">量比</div></div>'+
    '<div class="item"><div class="val">'+(result.turnoverRate?result.turnoverRate.toFixed(2)+'%':'--')+'</div><div class="lbl">换手率</div></div>'+
    '<div class="item"><div class="val">'+Math.round(result.kdj.K)+'/'+Math.round(result.kdj.D)+'</div><div class="lbl">KDJ K/D</div></div>'+
    '<div class="item"><div class="val '+(result.macd.hist>0?'up':'down')+'">'+(result.macd.hist?result.macd.hist.toFixed(3):'--')+'</div><div class="lbl">MACD柱</div></div></div>';
  
  h+='<div class="tech-section"><h3>📊 各维度</h3><div class="tech-row">';
  result.signals.forEach(function(s){var c=s.v>=62?'over':(s.v<=38?'under':'neutral');h+='<span class="tag '+c+'" title="'+s.d+'">'+s.n+(s.v>=62?'🟢':s.v<=38?'🔴':'⚪')+'</span>';});
  h+='</div></div>';
  
  h+='<div class="tech-section"><h3>💡 参考</h3><div style="font-size:12px;color:#8895b0;line-height:1.8;padding:0 4px">';
  if(result.score>=62){h+='✅ 评分积极，短线<b class="up">加仓</b>方向<br>· 设止损 -2% 控制风险';}
  else if(result.score>=45){h+='⏸️ 多空均衡，<b style="color:#f5a623">持有观望</b><br>· 等待明确信号';}
  else{h+='⚠️ 评分偏弱，<b class="down">减仓</b>回避<br>· 反弹减仓降低风险';}
  if(result.rsi6>80)h+='<br>🔴 RSI超买，注意回调';
  if(result.rsi6<25)h+='<br>🟢 RSI超卖，关注反弹';
  if(result.kdj.J>100)h+='<br>🔴 KDJ严重超买';
  if(result.kdj.J<0)h+='<br>🟢 KDJ严重超卖';
  h+='</div></div>';
  
  document.getElementById('resultArea').innerHTML = h;
}

async function search(){
  var input=document.getElementById('codeInput').value.trim();
  if(!input)return;
  
  // Auto-detect market from input
  if(input.toLowerCase()==='gold'||input.toLowerCase()==='auusd0'||input.toLowerCase()==='xau'||input.toLowerCase()==='伦敦金现'){setMarket('gold','AUUSD0');return;}
  if(/^[a-zA-Z]{1,5}$/.test(input)&&!/^\d{6}$/.test(input)){setMarket('us',input.toLowerCase());return;}
  
  var m={'a':'a'};
  if(market==='a')code=input.replace(/[^0-9]/g,'').slice(0,6);
  else if(market==='us')code=input.replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
  else code='XAUUSD';
  
  document.getElementById('resultArea').innerHTML='<div class="loading">🔄 加载中...</div>';
  
  try{
    var data=await fetchData();
    var kline=await fetchKlineData();
    name=data&&data.name?data.name:code.toUpperCase();
    var result=analyze(data,kline);
    render(result);
    var now=new Date();
    document.getElementById('statusBar').innerHTML='<span class="dot '+(result.score>=62?'red':'green')+'"></span>'+name+' | '+now.toLocaleTimeString('zh-CN')+' | 每5秒刷新';
    clearTimeout(autoTimer);
    autoTimer=setTimeout(search,autoInterval);
  }catch(e){
    document.getElementById('resultArea').innerHTML='<div class="error">❌ 获取失败: '+e.message+'</div>';
    clearTimeout(autoTimer);
    autoTimer=setTimeout(search,5000);
  }
}

// ===== 自动启动 =====
search();
</script>
