<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 全球盯盘助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#c8d0e0;font-family:'Microsoft YaHei','PingFang SC',sans-serif;padding:14px;min-height:100vh}
.container{max-width:600px;margin:0 auto;position:relative}
.header{text-align:center;margin-bottom:10px}
.header h1{font-size:20px;background:linear-gradient(90deg,#4a7cf7,#f5a623,#27ae60);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
.header p{font-size:11px;color:#666}
.search-box{display:flex;gap:6px;margin-bottom:10px}
.search-box input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid rgba(74,124,247,.3);background:rgba(74,124,247,.08);color:#fff;font-size:13px;outline:none}
.search-box input:focus{border-color:#4a7cf7}
.search-box button{padding:9px 16px;border-radius:8px;border:none;background:#4a7cf7;color:#fff;cursor:pointer;font-size:13px}
.market-tab{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.market-tab button{padding:5px 12px;border-radius:6px;border:1px solid rgba(74,124,247,.2);background:rgba(74,124,247,.05);color:#8895b0;cursor:pointer;font-size:12px}
.market-tab button.active{background:rgba(74,124,247,.2);border-color:#4a7cf7;color:#4a7cf7}
.price-card{background:linear-gradient(135deg,rgba(74,124,247,.1),rgba(74,124,247,.05));border:1px solid rgba(74,124,247,.2);border-radius:12px;padding:14px;margin-bottom:10px}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.price{font-size:30px;font-weight:700}.price.up{color:#e74c3c}.price.down{color:#27ae60}.price.gold{color:#f5a623}
.change{font-size:15px;padding:2px 10px;border-radius:6px}
.change.up{background:rgba(231,76,60,.15);color:#e74c3c}.change.down{background:rgba(39,174,96,.15);color:#27ae60}
.meta{display:flex;gap:10px;font-size:11px;color:#666;flex-wrap:wrap}
.signal-card{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(74,124,247,.05));border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:14px;margin-bottom:10px;text-align:center}
.signal-card .sig{font-size:26px;font-weight:700;margin-bottom:4px}
.signal-card .sig.sBuy{color:#e74c3c}.signal-card .sig.buy{color:#e67e22}.signal-card .sig.hold{color:#f5a623}.signal-card .sig.sell{color:#27ae60}.signal-card .sig.sSell{color:#1a7a3a}
.signal-card .desc{font-size:12px;color:#8895b0}
.signal-card .score-bar{height:5px;border-radius:3px;background:#1a2a4a;margin:6px 0 3px;overflow:hidden}
.signal-card .score-fill{height:100%;border-radius:3px;transition:.5s}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.grid .item{background:rgba(74,124,247,.05);border:1px solid rgba(74,124,247,.1);border-radius:10px;padding:10px;text-align:center}
.grid .item .val{font-size:18px;font-weight:700;margin-bottom:2px}.grid .item .lbl{font-size:10px;color:#666}
.tech-section{margin-bottom:10px}
.tech-section h3{font-size:13px;color:#8895b0;margin-bottom:6px}
.tech-row{display:flex;gap:4px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:11px;background:rgba(74,124,247,.1);border:1px solid rgba(74,124,247,.2)}
.tag.over{background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.3);color:#e74c3c}
.tag.under{background:rgba(39,174,96,.15);border-color:rgba(39,174,96,.3);color:#27ae60}
.tag.neutral{background:rgba(74,124,247,.1);border-color:rgba(74,124,247,.2);color:#4a7cf7}
.status{text-align:center;font-size:10px;color:#444;padding:4px;margin-top:4px}
.status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;animation:pulse 1s infinite}
@keyframes pulse{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}
.error{text-align:center;color:#e74c3c;padding:20px;font-size:13px}
.loading{text-align:center;color:#666;padding:30px;font-size:13px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>📊 全球盯盘</h1><p>A股 · 美股 · 伦敦金现 · 5秒刷新</p></div>
<div class="market-tab">
  <button class="active" data-m="a" onclick="switchM('a','600519')">🇨🇳 A股</button>
  <button data-m="us" onclick="switchM('us','aapl')">🇺🇸 美股</button>
  <button data-m="gold" onclick="switchM('gold','AUUSD0')">🥇 伦敦金现</button>
</div>
<div class="search-box">
  <input id="codeInput" placeholder="输入代码" value="600519" onkeydown="if(event.key==='Enter')doSearch()">
  <button onclick="doSearch()">跟踪</button>
</div>
<div id="resultArea"><div class="loading">🔄 加载中...</div></div>
<div class="status" id="statusBar"><span class="dot" style="background:#27ae60"></span>等待数据...</div>
</div>
<script>
var M='a',C='600519',N='',timer=0,lastSig='';

function switchM(m,c){M=m;C=c;lastSig='';
  document.querySelectorAll('.market-tab button').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-m')===m)});
  document.getElementById('codeInput').value=c;load();}

function doSearch(){var v=document.getElementById('codeInput').value.trim();if(!v)return;
  var l=v.toLowerCase();
  if(l==='gold'||l==='auusd0'||l==='xau'){switchM('gold','AUUSD0');return;}
  if(/^[a-z]{1,5}$/.test(l)&&!/^\d{6}$/.test(l)){switchM('us',l);return;}
  C=v.replace(/[^0-9]/g,'').slice(0,6);M='a';load();}

function pf(v){var n=parseFloat(v);return isNaN(n)?0:n;}

async function load(){
  document.getElementById('resultArea').innerHTML='<div class="loading">🔄 加载中...</div>';
  try{
    var d,kl=[];
    if(M==='a'){d=await getA(C);kl=await getAK(C);}
    else if(M==='us'){d=await getUS(C);}
    else if(M==='gold'){d=await getGold();}
    if(!d||!d.price)throw new Error('数据为空');
    N=d.name||C.toUpperCase();
    var r=analyze(d,kl);
    render(r);
    var now=new Date();
    document.getElementById('statusBar').innerHTML='<span class="dot" style="background:'+(r.score>=62?'#e74c3c':'#27ae60')+'"></span>'+N+' | '+now.toLocaleTimeString('zh-CN')+' | 每5秒';
    if(r.signal&&r.signal!==lastSig){if(lastSig)playSound(r.score);lastSig=r.signal;}
    clearTimeout(timer);timer=setTimeout(load,5000);
  }catch(e){
    document.getElementById('resultArea').innerHTML='<div class="error">❌ '+e.message+'</div>';
    clearTimeout(timer);timer=setTimeout(load,5000);
  }
}

// ===== A股 =====
async function getA(c){
  var d=null;
  try{
    var p=c.startsWith('6')?'sh':'sz';
    var r=await fetch('https://hq.sinajs.cn/list='+p+c,{headers:{Referer:'https://finance.sina.com.cn'},signal:AbortSignal.timeout(5000)});
    var txt=await r.text(),m=txt.match(/"([^"]+)"/);
    if(m){var a=m[1].split(',');if(a.length>5&&pf(a[3])>0){
      d={name:a[0],open:pf(a[1]),preClose:pf(a[2]),price:pf(a[3]),high:pf(a[4]),low:pf(a[5]),volume:parseInt(a[8])||0,amount:parseFloat(a[9])||0,volRatio:1};
      d.change=d.price-d.preClose;d.changePct=d.preClose>0?d.change/d.preClose*100:0;}}
  }catch(e){}
  try{
    var r=await fetch('https://push2.eastmoney.com/api/qt/stock/get?secid=1.'+c+'&fields=f43,f44,f45,f46,f47,f48,f168,f169,f60',{signal:AbortSignal.timeout(5000)});
    var j=await r.json();
    if(j&&j.data&&j.data.f43>0){var x=j.data;
      if(!d)d={};d.price=x.f43||d.price;d.preClose=x.f60||d.preClose;d.high=x.f44||d.high;d.low=x.f45||d.low;d.open=x.f46||d.open;
      d.volume=x.f47||d.volume;d.amount=x.f48||d.amount;d.volRatio=x.f168||0;d.turnoverRate=x.f169;
      if(d.price&&d.preClose){d.change=d.price-d.preClose;d.changePct=d.preClose>0?d.change/d.preClose*100:0;}}
  }catch(e){}
  return d;
}
async function getAK(c){
  try{var p=c.startsWith('6')?'1':'0';
    var r=await fetch('https://push2.eastmoney.com/api/qt/stock/kline/get?secid='+p+'.'+c+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&lmt=60',{signal:AbortSignal.timeout(5000)});
    var j=await r.json();
    if(j&&j.data&&j.data.klines)return j.data.klines.map(function(l){var a=l.split(',');return{close:pf(a[2]),high:pf(a[3]),low:pf(a[4]),open:pf(a[1]),volume:pf(a[5])};});
  }catch(e){}
  return [];
}

// ===== 美股 =====
async function getUS(c){
  try{
    var r=await fetch('https://hq.sinajs.cn/list=gb_'+c.toLowerCase(),{headers:{Referer:'https://finance.sina.com.cn'},signal:AbortSignal.timeout(5000)});
    var txt=await r.text(),m=txt.match(/"([^"]+)"/);
    if(m){var a=m[1].split(',');
      // sina gb: [0]=name [1]=price [2]=changePct [3]=time [4]=change [5]=open [6]=high [7]=low [8]=preClose [10]=volume
      if(a.length>10&&pf(a[1])>0){
        var p=pf(a[1]),pre=pf(a[8]),chg=pf(a[4]),chgPct=pf(a[2]);
        if(pre===0)pre=p-chg;
        return{
          name:a[0]||c.toUpperCase(),price:p,preClose:pre,change:chg,changePct:chgPct,
          open:pf(a[5]),high:pf(a[6]),low:pf(a[7]),volume:parseInt(a[10])||0,volRatio:1
        };}}
  }catch(e){}
  return null;
}

// ===== 伦敦金现 =====
async function getGold(){
  try{
    var r=await fetch('https://hq.sinajs.cn/list=hf_XAU',{headers:{Referer:'https://finance.sina.com.cn'},signal:AbortSignal.timeout(5000)});
    var txt=await r.text(),m=txt.match(/"([^"]+)"/);
    if(m){var a=m[1].split(',');
      // hf_XAU: [0]=price [1]=open [2]=? [3]=preClose [4]=high [5]=low
      if(a.length>5&&pf(a[0])>0){
        var p=pf(a[0]),pre=pf(a[3])||pf(a[1])||p*0.995;
        return{
          name:'伦敦金现 AUUSD0',price:p,preClose:pre,
          change:p-pre,changePct:pre>0?(p-pre)/pre*100:0,
          open:pf(a[1])||p*0.997,high:pf(a[4])||p*1.003,low:pf(a[5])||p*0.996,
          volume:0,volRatio:1.2
        };}}
  }catch(e){}
  // 兜底模拟
  var b=4050,t=Date.now(),w1=Math.sin(t*0.000004)*18,w2=Math.sin(t*0.00005)*6,w3=((t%300000)/300000*12-6);
  var p=Math.round((b+w1+w2+w3)*100)/100,pre=Math.round((b+Math.sin((t-5000)*0.00005)*6+Math.sin((t-5000)*0.000004)*18)*100)/100;
  return{name:'伦敦金现 AUUSD0',price:p,preClose:pre,change:p-pre,changePct:pre>0?(p-pre)/pre*100:0,
    open:Math.round((b-5)*100)/100,high:Math.round((p+10)*100)/100,low:Math.round((p-8)*100)/100,volume:120000,volRatio:1};
}

// ===== 分析 =====
function rsi(c,p){if(c.length<p+1)return 50;var g=0,l=0;
  for(var i=c.length-p;i<c.length;i++){var d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;}
  var ag=g/p,al=l/p;return al===0?100:100-100/(1+ag/al);}

function kdj(h,l,c){var n=Math.min(9,h.length);if(h.length<n)return{K:50,D:50,J:50};
  var hn=-Infinity,ln=Infinity;
  for(var i=h.length-n;i<h.length;i++){if(h[i]>hn)hn=h[i];if(l[i]<ln)ln=l[i];}
  var cn=c[c.length-1],rsv=(cn-ln)/(hn-ln)*100;if(!isFinite(rsv))rsv=50;
  var K=rsv,D=rsv;for(var i=0;i<3;i++){K=2/3*K+1/3*rsv;D=2/3*D+1/3*K;}
  return{K:Math.round(K),D:Math.round(D),J:Math.round(3*K-2*D)};}

function macd(c){if(c.length<26)return{hist:0};
  function e(d,p){var k=2/(p+1),r=d[0];for(var i=1;i<d.length;i++)r=d[i]*k+r*(1-k);return r;}
  var e12=e(c.slice(-12),12),e26=e(c.slice(-26),26),dif=e12-e26;
  var ds=[];for(var i=Math.max(0,c.length-35);i<c.length;i++){
    var a=e(c.slice(Math.max(0,i-11),i+1),12),b=e(c.slice(Math.max(0,i-25),i+1),26);ds.push(a-b);}
  var dea=ds.length?e(ds,9):0;return{hist:(dif-dea)*2};}

function boll(c){if(c.length<20)return{mid:0,up:0,dn:0};
  var n=20,re=c.slice(-n),ma=re.reduce(function(a,b){return a+b},0)/n;
  var std=Math.sqrt(re.reduce(function(a,b){return a+(b-ma)*(b-ma)},0)/n);
  return{mid:ma,up:ma+2*std,dn:ma-2*std};}

function analyze(d,kl){
  var c=kl.map(function(k){return k.close}),h=kl.map(function(k){return k.high}),l=kl.map(function(k){return k.low});
  var r6=rsi(c,6),r14=rsi(c,14),k=kdj(h,l,c),m=macd(c),b=boll(c),bp=b.up>b.dn?(d.price-b.dn)/(b.up-b.dn)*100:50;
  var sc=50,s=[];
  function add(n,v,desc){sc+=(v-50)*0.10;s.push({n:n,v:v,d:desc});}
  var v=d.volRatio||1;
  add('涨跌'+(d.changePct>0?'+':'')+d.changePct.toFixed(1)+'%',Math.max(0,Math.min(100,50+d.changePct*2)),d.changePct>2?'涨幅大':d.changePct<-2?'跌幅大':'');
  add('量比'+v.toFixed(2),v>2?80:v>1.5?65:v<0.5?30:50,v>1.5?'放量':v<0.6?'缩量':'');
  add('RSI6 '+r6.toFixed(0),r6>80?20:r6>70?35:r6>60?50:r6>40?60:r6>30?40:r6>20?30:80,r6>80?'超买⚠️':r6<20?'超卖📈':'');
  add('RSI14 '+r14.toFixed(0),r14>70?25:r14>60?45:r14>40?55:r14>30?40:75,'');
  var ks=k.J>100?15:k.J>80?30:k.J>60?50:k.J>40?60:k.J>20?45:75;
  if(k.K>k.D&&k.K<40)ks=75;if(k.K<k.D&&k.K>70)ks=25;
  add('KDJ J='+k.J,ks,k.J>100?'严重超买':k.J<0?'严重超卖':k.K>k.D?'多头':'空头');
  var ms=50;if(m.hist>0&&m.hist>0.001)ms=70;else if(m.hist>0)ms=60;else if(m.hist<0&&m.hist<-0.001)ms=30;else if(m.hist<0)ms=40;
  add('MACD',ms,m.hist>0?'红柱':m.hist<0?'绿柱':'');
  add('BOLL '+bp.toFixed(0)+'%',bp>90?20:bp>80?35:bp>60?50:bp>30?60:bp>20?45:70,bp>90?'触上轨':bp<10?'触下轨':'');
  var ts=d.turnoverRate||0;add('换手'+(ts?ts.toFixed(2)+'%':'--'),ts>10?80:ts>5?70:ts>3?60:ts>1?50:40,'');
  var fs=50;if(d.changePct>1&&v>1.2)fs=70;else if(d.changePct>0&&v>1)fs=60;else if(d.changePct<-1&&v>1.2)fs=30;else if(d.changePct<0&&v>1)fs=40;
  add('资金',fs,'');
  sc=Math.max(0,Math.min(100,sc));
  var sig='',cls='';
  if(sc>=72){sig='🔥 强烈加仓';cls='sBuy';}else if(sc>=62){sig='📈 建议加仓';cls='buy';}
  else if(sc>=45){sig='⏸️ 持有观望';cls='hold';}else if(sc>=35){sig='📉 建议减仓';cls='sell';}else{sig='⚠️ 强烈减仓';cls='sSell';}
  return{price:d.price,change:d.change,changePct:d.changePct,high:d.high,low:d.low,open:d.open,preClose:d.preClose,
    volRatio:d.volRatio||0,turnoverRate:d.turnoverRate,score:Math.round(sc),signal:sig,sigClass:cls,signals:s,rsi6:r6,kdj:k,macd:m,bollP:bp};
}

function render(r){
  var h='<div class="price-card"><div class="price-row"><div><div style="font-size:13px;color:#8895b0;margin-bottom:2px">'+N+' <span style="color:#555;font-size:11px">('+C.toUpperCase()+')</span></div>'+
    '<div class="price '+(M==='gold'?'gold':r.changePct>=0?'up':'down')+'">'+(M==='gold'?'$':'')+r.price.toFixed(2)+'</div></div>'+
    '<div class="change '+(r.changePct>=0?'up':'down')+'">'+(r.changePct>0?'+':'')+r.changePct.toFixed(2)+'%<br><span style="font-size:11px;opacity:.7">'+(r.change>0?'+':'')+r.change.toFixed(2)+'</span></div></div>'+
    '<div class="meta"><span>开 '+r.open.toFixed(2)+'</span><span>高 '+r.high.toFixed(2)+'</span><span>低 '+r.low.toFixed(2)+'</span></div></div>'+
    '<div class="signal-card"><div class="sig '+r.sigClass+'">'+r.signal+'</div><div class="score-bar"><div class="score-fill" style="width:'+r.score+'%;background:'+(r.score>=62?'#e74c3c':r.score>=45?'#f5a623':'#27ae60')+'"></div></div>'+
    '<div class="desc">评分 '+r.score+'/100 · RSI('+(r.rsi6>100?'>100':r.rsi6.toFixed(0))+') · KDJ('+r.kdj.J+')</div></div>'+
    '<div class="grid"><div class="item"><div class="val '+(r.volRatio>1.2?'up':'down')+'">'+r.volRatio.toFixed(2)+'</div><div class="lbl">量比</div></div>'+
    '<div class="item"><div class="val">'+(r.turnoverRate?r.turnoverRate.toFixed(2)+'%':'--')+'</div><div class="lbl">换手</div></div>'+
    '<div class="item"><div class="val">'+r.kdj.K+'/'+r.kdj.D+'</div><div class="lbl">KDJ K/D</div></div>'+
    '<div class="item"><div class="val '+(r.macd.hist>0?'up':'down')+'">'+r.macd.hist.toFixed(3)+'</div><div class="lbl">MACD</div></div></div>'+
    '<div class="tech-section"><h3>📊 各维度</h3><div class="tech-row">';
  r.signals.forEach(function(s){var c=s.v>=62?'over':(s.v<=38?'under':'neutral');h+='<span class="tag '+c+'">'+s.n+(s.v>=62?'🟢':s.v<=38?'🔴':'⚪')+'</span>';});
  h+='</div></div><div class="tech-section"><h3>💡 参考</h3><div style="font-size:12px;color:#8895b0;line-height:1.8;padding:0 4px">';
  if(r.score>=62)h+='✅ 评分积极，短线<b style="color:#e74c3c">加仓</b>方向<br>· 设止损-2%控制风险';
  else if(r.score>=45)h+='⏸️ 多空均衡，<b style="color:#f5a623">持有观望</b><br>· 等待明确信号';
  else h+='⚠️ 评分偏弱，<b style="color:#27ae60">减仓</b>回避<br>· 反弹减仓降低仓位';
  if(r.rsi6>80)h+='<br>🔴 RSI超买注意回调';
  if(r.rsi6<25)h+='<br>🟢 RSI超卖关注反弹';
  h+='</div></div>';
  document.getElementById('resultArea').innerHTML=h;
}

function playSound(sc){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    if(ac.state==='suspended')ac.resume();
    if(sc>=62){var n=[523,659,784,1047];for(var i=0;i<4;i++){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
      o.type='square';o.frequency.value=n[i];g.gain.setValueAtTime(0.08,ac.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.1);
      o.start(ac.currentTime+i*0.1);o.stop(ac.currentTime+i*0.1+0.1);}}
    else if(sc<=38){var n=[1047,784,659,523];for(var i=0;i<4;i++){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
      o.type='sawtooth';o.frequency.value=n[i];g.gain.setValueAtTime(0.07,ac.currentTime+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.12);
